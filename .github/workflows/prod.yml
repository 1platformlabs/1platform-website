          }
          with open("slack_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PYEOF

          if [ -n "${SLACK_WEBHOOK}" ]; then
            curl -fsSL -X POST -H "Content-Type: application/json" \
              -d @slack_payload.json "${SLACK_WEBHOOK}"
          fi

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -f slack_payload.json || true
